name: Daily Article Generator

on:
  schedule:
    # 毎朝 9:00 JST (= UTC 00:00) に実行
    - cron: "0 0 * * *"
  workflow_dispatch: # 手動実行も可能

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Generate article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          OUTPUT_DIR: ${{ github.workspace }}/有料Note
        run: npx tsx scripts/daily-article.ts

      - name: Post to note.com
        env:
          NOTE_COOKIES: ${{ secrets.NOTE_COOKIES }}
          NOTE_PRICE: ${{ secrets.NOTE_PRICE }}
          OUTPUT_DIR: ${{ github.workspace }}/有料Note
        run: npx tsx scripts/post-to-note.ts

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: /tmp/*.png
          retention-days: 3
